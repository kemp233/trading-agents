# ============================================================
# 期货专用风控参数配置
# AppID: client_aiagentts_1.0.0
# 开发人: 方馒涵
# 适用柜台: CTP（东证期货）
# 对应接入测试指标: T/ZQX 0004-2025
# ============================================================

# ── 应用标识 ─────────────────────────────────────────────────
app_id: client_aiagentts_1.0.0
broker_id: "9999"          # 东证期货 broker_id
user_id: "256354"          # SimNow 仿真账号
ctp_front_addr: "tcp://180.168.146.187:10130"  # SimNow 7x24 仿真前置地址

# ── CTP 登录凭证 ────────────────────────────────────────────────
#
# ⚠️  密码禁止写入此文件！公开仓库中的文件任何人都可见。
#      请在启动前设置环境变量：
#
#      Linux / macOS / WSL：
#        export CTP_PASSWORD=你的SimNow密码
#
#      Windows PowerShell：
#        $env:CTP_PASSWORD = "你的SimNow密码"
#
#      Windows CMD：
#        set CTP_PASSWORD=你的SimNow密码
#
password: ""               # 留空！密码通过 CTP_PASSWORD 环境变量设置
auth_code: "0000000000000000"  # SimNow 仿真环境标准认证码（16个零）

# ── 数据库 ────────────────────────────────────────────────────
db_path: ./data/futures.db
log_level: INFO

# ── 指标4：报撤单笔数阈值 ─────────────────────────────────────
max_order_per_minute: 100     # 每分钟最大报单笔数
max_cancel_per_minute: 50     # 每分钟最大撤单笔数

# ── 指标5：重复报单阈值 ───────────────────────────────────────
max_duplicate_orders: 3       # 同合约同方向同价格最大重复报单次数

# ── 指标6：阈值预警比例 ───────────────────────────────────────
alert_threshold_percent: 80   # 达到阈值的 80% 时触发预警通知

# ── 指标3：断线重连参数 ───────────────────────────────────────
reconnect_max_retries: 5      # 最大重连次数，超限后停止并告警
reconnect_backoff_base: 2     # 指数退避基数（秒），第n次等待 base^n 秒
reconnect_backoff_max: 60     # 最大等待上限（秒）
