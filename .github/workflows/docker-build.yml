name: Docker Build (Local)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image (Local)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: trading-agents:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: List built image
      run: docker images | grep trading-agents
